services:
  - type: web
    name: tataheer-erp
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this manually in Render dashboard
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false